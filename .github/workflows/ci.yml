name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  ci:
    name: Lint, Type Check, Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build

      - name: Test
        run: npx vitest run

  smoke-test:
    name: Post-Deploy Health Check
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Health check
        run: |
          RESPONSE=$(curl -sf --max-time 30 https://reviewly-self.vercel.app/api/health)
          echo "$RESPONSE" | jq .

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          SUPABASE=$(echo "$RESPONSE" | jq -r '.checks.supabase_connection.status')

          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Health check status: $STATUS"
            exit 1
          fi

          if [ "$SUPABASE" != "pass" ]; then
            echo "::error::Supabase connection check failed"
            exit 1
          fi

          echo "Health check passed: status=$STATUS, supabase=$SUPABASE"
